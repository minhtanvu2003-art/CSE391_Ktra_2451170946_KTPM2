<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; font-size: 14px; }

    .wrap { max-width: 720px; margin: 40px auto; padding: 0 16px; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      margin-bottom: 16px;
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .card-header-row h2 { font-size: 1.75rem; font-weight: 800; }

    .btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 7px 18px; border: none; border-radius: 8px;
      font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-dark { background: #1a1a2e; color: #fff; }
    .btn-sm   { padding: 5px 14px; font-size: .8rem; }
    .btn-link { background: none; border: none; cursor: pointer; padding: 2px 4px; font-size: 1rem; }
    .btn-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; line-height: 1; color: #aaa;
    }
    .btn-close:hover { color: #333; }

    .task-row {
      display: flex; align-items: center;
      border-top: 1px solid #f0f0f0;
      padding: 14px 0; gap: 8px;
    }
    .task-col-name   { flex: 0 0 35%; }
    .task-col-pri    { flex: 0 0 22%; }
    .task-col-status { flex: 0 0 22%; }
    .task-col-act    { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 6px; }

    .task-label { font-size: .7rem; color: #aaa; margin-bottom: 2px; }
    .task-name  { font-size: .93rem; font-weight: 500; }

    .pri-High   { color: #e63946; font-weight: 700; font-size: .85rem; }
    .pri-Medium { color: #f4a261; font-weight: 700; font-size: .85rem; }
    .pri-Low    { color: #2a9d8f; font-weight: 700; font-size: .85rem; }

    .status-badge {
      display: inline-block; padding: 3px 12px;
      border: 1px solid #ddd; border-radius: 20px;
      background: #f8f9fa; color: #555; font-size: .77rem; white-space: nowrap;
    }

    .circle-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #ccc; background: transparent; cursor: pointer; flex-shrink: 0;
    }
    .circle-btn:hover { border-color: #888; }

    .icon-edit  { color: #555; font-size: 1rem; }
    .icon-del   { color: #e63946; font-size: 1rem; }

    .form-label { display: block; font-size: .82rem; font-weight: 600; color: #333; margin-bottom: 5px; }
    .form-control {
      width: 100%; padding: 8px 12px; font-size: .88rem;
      border: 1px solid #ddd; border-radius: 6px; outline: none;
    }
    .form-control:focus { border-color: #1a1a2e; box-shadow: 0 0 0 2px rgba(26,26,46,.1); }
.mb-3 { margin-bottom: 16px; }
    .mt-4 { margin-top: 20px; }

    .priority-btn {
      padding: 5px 14px; border: 1px solid #ccc; border-radius: 6px;
      background: #fff; font-size: .82rem; font-weight: 600; cursor: pointer; color: #555; transition: all .15s;
    }
    .priority-btn.active-High   { background: #e63946; color: #fff; border-color: #e63946; }
    .priority-btn.active-Medium { background: #f4a261; color: #fff; border-color: #f4a261; }
    .priority-btn.active-Low    { background: #2a9d8f; color: #fff; border-color: #2a9d8f; }

    .d-flex  { display: flex; }
    .gap-2   { gap: 8px; }
    .justify-end { justify-content: flex-end; }

    .error-msg { display: none; color: #e92334; font-size: .78rem; margin-top: 4px; }

    .icon::before { font-style: normal; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="card-header-row">
      <h2>Task List</h2>
      <button class="btn btn-dark btn-sm" onclick="toggleAddPanel()">
        &#43; Add Task
      </button>
    </div>
    <div id="taskList"></div>
  </div>

  <div class="card" id="addPanel" style="display:none">
    <div class="card-header-row" style="margin-bottom:16px">
      <strong>Add Task</strong>
      <button class="btn-close" onclick="toggleAddPanel()">&#10005;</button>
    </div>

    <div class="mb-3">
      <label class="form-label">Task</label>
      <input id="taskInput" type="text" class="form-control"
             placeholder="Type your task here..." maxlength="100" />
      <div id="taskError" class="error-msg">
        Task name can't be blank and czn't go over 100 .
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Priority</label>
      <div class="d-flex gap-2">
        <button class="priority-btn active-High"  id="btn-High"   onclick="selectPriority('High')">High</button>
        <button class="priority-btn"              id="btn-Medium" onclick="selectPriority('Medium')">Medium</button>
        <button class="priority-btn"              id="btn-Low"    onclick="selectPriority('Low')">Low</button>
      </div>
    </div>

    <div class="d-flex justify-end mt-4">
      <button class="btn btn-dark btn-sm" onclick="addTask()">Add</button>
    </div>
  </div>

</div>

<script>
  let tasks = [], selectedPriority = 'High';

  async function loadData() {
    try {
      const res = await fetch('data.json');
      const data = await res.json();
      tasks = data.tasks;
    } catch {
      tasks = [
        { id: 1, name: "Go to gym",    priority: "High",   status: "To Do"      },
        { id: 2, name: "Read a book",  priority: "Low",    status: "Done"        },
        { id: 3, name: "Go to market", priority: "Medium", status: "In Progress" },
        { id: 4, name: "Write report", priority: "High",   status: "To Do"       },
        { id: 5, name: "Call doctor",  priority: "Medium", status: "Done"        }
      ];
    }
    renderTasks();
  }

  function renderTasks() {
document.getElementById('taskList').innerHTML = tasks.map(t => `
      <div class="task-row">
        <div class="task-col-name">
          <div class="task-label">Task</div>
          <div class="task-name">${t.name}</div>
        </div>
        <div class="task-col-pri">
          <div class="task-label">Priority</div>
          <div class="pri-${t.priority}">${t.priority}</div>
        </div>
        <div class="task-col-status">
          <span class="status-badge">${t.status}</span>
        </div>
        <div class="task-col-act">
          <button class="circle-btn"></button>
          <button class="btn-link icon-edit" title="Edit">&#9998;</button>
          <button class="btn-link icon-del"  title="Delete" onclick="deleteTask(${t.id})">&#128465;</button>
        </div>
      </div>`).join('');
  }

  function toggleAddPanel() {
    const p = document.getElementById('addPanel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
    document.getElementById('taskInput').value = '';
    document.getElementById('taskError').style.display = 'none';
    selectPriority('High');
  }

  function selectPriority(p) {
    selectedPriority = p;
    ['High','Medium','Low'].forEach(v => {
      document.getElementById('btn-' + v).className =
        'priority-btn' + (v === p ? ' active-' + v : '');
    });
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const err   = document.getElementById('taskError');
    const val   = input.value.trim();
    if (!val || val.length > 100) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    tasks.push({ id: Date.now(), name: val, priority: selectedPriority, status: 'To Do' });
    renderTasks();
    toggleAddPanel();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
  }

  loadData();
</script>
</body>
</html>
