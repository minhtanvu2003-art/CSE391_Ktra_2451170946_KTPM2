<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<input
    type="text"
    id="task"
    class="form-control"
    placeholder="Nhập tên Task">

<button
    class="btn btn-secondary mt-3"
    onclick="validateTask()">
    Add
</button>
    <style>
        .task-box{
            border:1px solid #0d6efd;
            padding:20px;
        }

        .task-card{
            background:#d81fad;
            border-radius:15px;
            padding:15px;
            margin-bottom:15px;
        }

        .high{color:red;font-weight:bold;}
        .medium{color:orange;font-weight:bold;}
        .low{color:green;font-weight:bold;}
    </style>
</head>
<script>
function validateTask() {

    let task =
        document.getElementById("task")
        .value
        .trim();

    // Kiểm tra rỗng
    if(task === ""){
        alert("Vui lòng nhập tên Task");
        return false;
    }

    // Kiểm tra > 100 ký tự
    if(task.length > 100){
        alert("Tên Task không được quá 100 ký tự");
        return false;
    }

    alert("Dữ liệu hợp lệ");
    return true;
}
</script>   
<body>

<div class="container mt-4">

    <div class="task-box">

        <div class="d-flex justify-content-between mb-4">
            <h2>Task List</h2>
            <button class="btn btn-primary">
                + Add Task
            </button>
        </div>

        <div class="task-card row align-items-center">
            <div class="col">Go to gym</div>
            <div class="col high">High</div>
            <div class="col">
                <span class="badge bg-secondary">To Do</span>
            </div>
            <div class="col"><input type="radio"></div>
            <div class="col">✏️</div>
            <div class="col">🗑️</div>
        </div>

        <div class="task-card row align-items-center">
            <div class="col">Read a book</div>
            <div class="col low">Low</div>
            <div class="col">
                <span class="badge bg-success">Done</span>
            </div>
            <div class="col"><input type="radio" checked></div>
            <div class="col">✏️</div>
            <div class="col">🗑️</div>
        </div>

        <div class="task-card row align-items-center">
            <div class="col">Go to market</div>
            <div class="col medium">Medium</div>
            <div class="col">
                <span class="badge bg-warning text-dark">
                    In Progress
                </span>
            </div>
            <div class="col"><input type="radio"></div>
            <div class="col">✏️</div>
            <div class="col">🗑️</div>
        </div>

    </div>

    <div class="task-box mt-4">
        <h5>Add Task</h5>

        <label class="form-label">Task</label>
        <input type="text" class="form-control mb-3">

        <label class="form-label">Priority</label>
        <br>

        <button class="btn btn-outline-danger btn-sm">High</button>
        <button class="btn btn-outline-warning btn-sm">Medium</button>
        <button class="btn btn-outline-success btn-sm">Low</button>

        <div class="text-end mt-4">
            <button class="btn btn-secondary">Add</button>
        </div>
    </div>

</div>
<script>
function validateTask() {

    let task =
        document.getElementById("task")
        .value
        .trim();

    // Kiểm tra rỗng
    if(task === ""){
        alert("Vui lòng nhập tên Task");
        return false;
    }

    // Kiểm tra > 100 ký tự
    if(task.length > 100){
        alert("Tên Task không được quá 100 ký tự");
        return false;
    }

    alert("Dữ liệu hợp lệ");
    return true;
}
</script>
</body>
</html>
